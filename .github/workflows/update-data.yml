name: Update Dashboard Data

on:
  schedule:
    # Update every 5 minutes
    - cron: '*/5 * * * *'
  workflow_dispatch:
    # Allow manual triggers

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Update monitoring data
        run: |
          # This would normally fetch data from the Mac mini
          # For now, we'll update with placeholder data
          echo "Updating dashboard data..."
          
          # Create data directory if it doesn't exist
          mkdir -p data
          
          # Update cost data with current timestamp
          cat > data/cost-state.json << EOF
          {
            "expectedSavings": 32,
            "actualSavings": 12,
            "heartbeatSavings": 0,
            "cronSavings": 12,
            "efficiency": 0.375,
            "breakdown": {
              "heartbeat": {"savings": 0, "status": "Fix Needed", "using_local": false},
              "cron_jobs": {"savings": 12, "status": "Optimized", "jobs_local": 3, "jobs_total": 3}
            },
            "lastValidation": "$(date -u +%Y-%m-%dT%H:%M:%S.%3NZ)"
          }
          EOF
          
          # Update system status
          cat > data/system-status.json << EOF
          {
            "status": "online",
            "version": "2026.4.22",
            "model": {
              "primary": "anthropic/claude-sonnet-4-20250514",
              "fallbacks": ["ollama/llama3.2:3b", "openai/gpt-5.4"]
            },
            "lastCheck": "$(date -u +%Y-%m-%dT%H:%M:%S.%3NZ)"
          }
          EOF
          
      - name: Commit and push if changed
        run: |
          git config --local user.email "shelia@cpdgrp.com"
          git config --local user.name "ProductiveBot Mission Control"
          git add data/
          git diff --staged --quiet || git commit -m "🤖 Auto-update dashboard data $(date)"
          git push